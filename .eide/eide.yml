targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - USE_HAL_DRIVER
        - STM32F407xx
      incList:
        - Core/Inc
        - Drivers/CMSIS/Device/ST/STM32F4xx/Include
        - Drivers/CMSIS/Include
        - Drivers/STM32F4xx_HAL_Driver/Inc
        - Drivers/BSP/Components/dp83848
        - LWIP/App
        - LWIP/Target
        - Middlewares/Third_Party/LwIP/src/include
        - Middlewares/Third_Party/LwIP/system
        - Drivers/BSP/Protocol
        - Drivers/BSP/RingBuffer
        - Drivers/BSP/Config
      libList: []
    excludeList: []
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: c17
            language-cpp: c++17
            no-exceptions: true
            no-rtti: true
            no-threadsafe-statics: true
            no-use-cxa-atexit: true
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            arm-thumb-interwork: true
            arm-thumb-mode: thumb
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $toolName: auto
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: Compiler/STM32F407XX_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: cmsis-dap
        target: stm32f4x
    uploader: OpenOCD
